name: Apply FastMCP Compatibility Patch

on:
  push:
    branches: [agent/live-datahub-proof]
    paths:
      - ".github/workflows/apply-fastmcp-compat.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-datahub-proof
          fetch-depth: 0

      - name: Apply strict FastMCP result-envelope compatibility
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path('src/toxicjoin/integrations/datahub_mcp.py')
          source = source_path.read_text()
          old = '''        payload = await self.transport.call_tool("get_entities", {"urns": list(urns)})
          if not isinstance(payload, list) or not all(
              isinstance(item, dict) for item in payload
          ):
              raise DataHubMcpError("get_entities returned an unexpected payload")
          return tuple(payload)
          '''
          new = '''        payload = await self.transport.call_tool("get_entities", {"urns": list(urns)})
          payload = _unwrap_fastmcp_collection_result(payload)
          if not isinstance(payload, list) or not all(
              isinstance(item, dict) for item in payload
          ):
              raise DataHubMcpError("get_entities returned an unexpected payload")
          return tuple(payload)
          '''
          if old not in source:
              raise SystemExit('expected get_entities block was not found')
          source = source.replace(old, new, 1)

          marker = '''def _parse_json_or_text(value: str) -> Any:
          '''
          helper = '''def _unwrap_fastmcp_collection_result(value: Any) -> Any:
              """Unwrap FastMCP's standard envelope for non-object structured output.

              FastMCP exposes list and primitive return values as ``{"result": value}``
              because MCP structured content itself must be an object. Only that exact
              one-key envelope is accepted; additional keys remain a contract failure.
              """

              if isinstance(value, dict) and set(value) == {"result"}:
                  return value["result"]
              return value


          def _parse_json_or_text(value: str) -> Any:
          '''
          if marker not in source:
              raise SystemExit('helper insertion marker was not found')
          source = source.replace(marker, helper, 1)
          source_path.write_text(source)

          test_path = Path('tests/unit/test_datahub_mcp.py')
          tests = test_path.read_text()
          addition = '''

          def test_get_entities_accepts_fastmcp_collection_result_envelope() -> None:
              urn = "urn:li:dataset:test"
              transport = FakeTransport(
                  responses={"get_entities": [{"result": [{"urn": urn}]}]}
              )

              entities = asyncio.run(DataHubMcpClient(transport).get_entities((urn,)))

              assert entities == ({"urn": urn},)


          def test_get_entities_still_accepts_bare_list() -> None:
              urn = "urn:li:dataset:test"
              transport = FakeTransport(responses={"get_entities": [[{"urn": urn}]]})

              entities = asyncio.run(DataHubMcpClient(transport).get_entities((urn,)))

              assert entities == ({"urn": urn},)


          def test_get_entities_rejects_nonstandard_result_envelope() -> None:
              urn = "urn:li:dataset:test"
              transport = FakeTransport(
                  responses={
                      "get_entities": [
                          {"result": [{"urn": urn}], "metadata": {"unsafe": True}}
                      ]
                  }
              )

              with pytest.raises(DataHubMcpError, match="unexpected payload"):
                  asyncio.run(DataHubMcpClient(transport).get_entities((urn,)))
          '''
          if 'test_get_entities_accepts_fastmcp_collection_result_envelope' not in tests:
              test_path.write_text(tests.rstrip() + addition + '\n')
          PY

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Verify patch
        run: |
          ruff check src tests
          pytest tests/unit/test_datahub_mcp.py tests/integration/test_datahub_spike.py -q

      - name: Commit verified compatibility patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch changes remain."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/toxicjoin/integrations/datahub_mcp.py tests/unit/test_datahub_mcp.py
          git commit -m "Support FastMCP collection result envelopes"
          git push origin HEAD:agent/live-datahub-proof
