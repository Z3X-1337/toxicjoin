name: Apply Submission Agent Skill Update

# Temporary review-only workflow; remove after the packet is updated.
on:
  push:
    branches: [agent/submission-packet]
    paths:
      - ".github/workflows/apply-submission-agent-skill.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out submission packet branch
        uses: actions/checkout@v4
        with:
          ref: agent/submission-packet

      - name: Apply exact Agent Skill review updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected block once, found {count}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          draft = 'docs/submission/devpost-draft.md'
          replace_once(
              draft,
              '**Built with:** Python, FastAPI, SQLGlot, DuckDB, DataHub OSS, DataHub Python SDK, DataHub MCP Server, MCP Python SDK, React, TypeScript, Vite, Docker, GitHub Actions',
              '**Built with:** Python, FastAPI, SQLGlot, DuckDB, DataHub OSS, DataHub Python SDK, DataHub MCP Server, DataHub Agent Skills / Agent Registry preview, MCP Python SDK, React, TypeScript, Vite, Docker, GitHub Actions',
          )
          replace_once(
              draft,
              '- **Hosted replay evidence:** https://github.com/Z3X-1337/toxicjoin/blob/main/docs/evidence/hosted-replay.md\n',
              '- **Hosted replay evidence:** https://github.com/Z3X-1337/toxicjoin/blob/main/docs/evidence/hosted-replay.md\n- **Agent Skill / Agent Registry preview evidence:** https://github.com/Z3X-1337/toxicjoin/blob/main/docs/evidence/datahub-agent-registry.md\n',
          )
          replace_once(
              draft,
              'No upstream DataHub contribution is claimed in the current submission draft. ToxicJoin contributes an independent open-source integration and compatibility evidence, but this field should remain explicit rather than presenting project code as an upstream contribution.',
              'No upstream-merged DataHub contribution is claimed. ToxicJoin does publish an Apache-2.0, git-backed `Compositional Risk Review` Agent Skill in the public project repository and proves it as a DataHub Agent Registry graph in a separate development-channel evidence run. The skill is a reusable open-source DataHub Agent Skill maintained with ToxicJoin; it must not be described as merged into the upstream DataHub repository.',
          )
          live_paragraph = 'A real DataHub OSS gate passed in GitHub Actions. The official SDK created five datasets, 19 governed fields, nine tags, seven glossary terms, and four column-lineage writes. The official MCP Server then read the five entities and their schemas, returned three upstream relationships for the flagship churn-score field, wrote a DataHub Decision, closed the writing process, opened a fresh MCP process, and found the unique marker inside the persisted document through `grep_documents`. Sanitized JSON evidence with reproducible content hashes is committed under `docs/evidence/`, and the retained proof contains no token value, password, local endpoint, raw warehouse row, or local filesystem path.'
          preview_paragraph = live_paragraph + '\n\nToxicJoin also publishes a reusable `Compositional Risk Review` Agent Skill. In a separate preview-only proof, DataHub Agent Registry persisted five MCP tools as API entities, the git-backed Agent Skill, and a ToxicJoin AI Agent that adopts the skill and consumes all five governed datasets. A fresh graph client independently verified the skill source path, five required tools, Agent→Skill / Agent→Tool dependencies, and all five dataset lineage dependencies. This proof is intentionally isolated on `acryl-datahub==1.6.0.16rc3` and DataHub\'s documented `quickstart` development channel because Agent Registry helpers are not present in the stable `1.6.0.15` wheel; ToxicJoin\'s core enforcement does not depend on the preview capability.'
          replace_once(draft, live_paragraph, preview_paragraph)
          replace_once(
              draft,
              '- official DataHub SDK and MCP integrations with runtime contract discovery, hard timeouts, bounded pagination, minimal child-process environment, and fail-closed behavior;\n',
              '- official DataHub SDK and MCP integrations with runtime contract discovery, hard timeouts, bounded pagination, minimal child-process environment, and fail-closed behavior;\n- an Apache-2.0 git-backed DataHub `Compositional Risk Review` Agent Skill plus independently verified Agent→Skill→MCP tools→datasets preview graph;\n',
          )
          replace_once(
              draft,
              '- DataHub used for governed context, column lineage, and durable Decision write-back.\n',
              '- DataHub used for governed context, column lineage, and durable Decision write-back.\n- A reusable open-source DataHub Agent Skill registered and independently read back as an Agent Registry preview graph.\n',
          )
          replace_once(
              draft,
              'The current scope intentionally supports a narrow, auditable rewrite: strengthening a minimum distinct-subject threshold on an already-grouped query. Future work could add governed location coarsening, approved identifier removal, organization-specific policy packs, warehouse adapters beyond DuckDB, and a first-class DataHub Skill for compositional-risk analysis. Those extensions should preserve the same rule: unsupported or ambiguous transformations fail closed.',
              'The current scope intentionally supports a narrow, auditable rewrite: strengthening a minimum distinct-subject threshold on an already-grouped query. The reusable DataHub Agent Skill now exists; future work could upstream or standardize that skill, add governed location coarsening, approved identifier removal, organization-specific policy packs, and warehouse adapters beyond DuckDB. Those extensions should preserve the same rule: unsupported or ambiguous transformations fail closed.',
          )

          index = 'docs/submission/owner-review-index.md'
          replace_once(
              index,
              '| Live DataHub proof | Ready | https://github.com/Z3X-1337/toxicjoin/blob/main/docs/evidence/datahub-live.md |\n',
              '| Live DataHub proof | Ready | https://github.com/Z3X-1337/toxicjoin/blob/main/docs/evidence/datahub-live.md |\n| Open-source Agent Skill / Agent Registry preview | Ready | https://github.com/Z3X-1337/toxicjoin/blob/main/docs/evidence/datahub-agent-registry.md |\n',
          )
          replace_once(
              index,
              '| Devpost text | Draft ready; replay/video placeholders remain | `devpost-draft.md` |',
              '| Devpost text | Draft ready; only final video URL placeholder remains | `devpost-draft.md` |',
          )
          live_end = 'The proof used a real ephemeral DataHub OSS deployment inside GitHub Actions. It does not claim that the hosted static Replay is a live DataHub session or that the temporary DataHub environment remains publicly available.\n'
          skill_review = live_end + '''\n#### Agent Skill / Agent Registry preview\n\nReview:\n\n- `skills/compositional-risk-review/SKILL.md`;\n- `docs/evidence/datahub-agent-registry.md`;\n- `docs/evidence/datahub-agent-registry.json`;\n- `docs/evidence/datahub-agent-registry-verified.json`.\n\nConfirm that the public wording preserves the version boundary: the stable SDK/MCP proof remains on `acryl-datahub==1.6.0.15`, while Agent Registry proof is a separate preview using `acryl-datahub==1.6.0.16rc3` with DataHub's coordinated `quickstart` development images. Confirm that no text calls the skill an upstream-merged DataHub contribution.\n'''
          replace_once(index, live_end, skill_review)

          claims = 'docs/submission/claims-evidence-map.md'
          skill_row = '| ToxicJoin publishes a reusable DataHub Agent Skill | `skills/compositional-risk-review/SKILL.md`, `docs/evidence/datahub-agent-registry.md`, live Agent Registry gate | “The Apache-2.0 Compositional Risk Review skill is git-backed and was registered/read back as a DataHub Agent Registry preview graph.” | That the skill is merged upstream, stable in the released SDK, or required for core enforcement |\n'
          file = Path(claims)
          text = file.read_text(encoding='utf-8')
          marker = '| DataHub is used as governed context |'
          if skill_row not in text:
              position = text.find(marker)
              if position == -1:
                  raise SystemExit('claims map DataHub marker not found')
              text = text[:position] + skill_row + text[position:]
              file.write_text(text, encoding='utf-8')
          PY

      - name: Validate review packet state
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'Agent Skill / Agent Registry preview evidence' docs/submission/devpost-draft.md
          grep -q 'only final video URL placeholder remains' docs/submission/owner-review-index.md
          grep -q 'Agent Skill / Agent Registry preview' docs/submission/owner-review-index.md
          grep -q 'publishes a reusable DataHub Agent Skill' docs/submission/claims-evidence-map.md
          ! grep -R '\[PENDING_VERIFIED_PAGES_URL\]' docs/submission
          count=$(grep -Roh '\[PENDING_[^]]*\]' docs/submission | sort -u | wc -l)
          test "$count" -eq 1
          grep -R '\[PENDING_PUBLIC_YOUTUBE_OR_VIMEO_URL\]' docs/submission/devpost-draft.md

      - name: Commit review-only packet updates
        shell: bash
        run: |
          git config user.name 'toxicjoin-ci'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            docs/submission/devpost-draft.md \
            docs/submission/owner-review-index.md \
            docs/submission/claims-evidence-map.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Add verified Agent Skill evidence to submission review packet'
          git push origin HEAD:agent/submission-packet
