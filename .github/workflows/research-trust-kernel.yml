name: Research Trust Kernel Authorization

on:
  pull_request:
    paths:
      - "research/trust_kernel/**"
      - ".github/workflows/research-trust-kernel.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorization-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ToxicJoin test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run proof-carrying authorization attacks
        shell: bash
        run: |
          set -o pipefail
          mkdir -p research-artifacts/trust-kernel
          python -m pytest -vv research/trust_kernel/test_authorization.py \
            2>&1 | tee research-artifacts/trust-kernel/pytest-output.txt

      - name: Upload trust-kernel diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toxicjoin-trust-kernel-diagnostics
          path: research-artifacts/trust-kernel/pytest-output.txt
          if-no-files-found: warn
          retention-days: 30
