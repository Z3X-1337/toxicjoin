name: Research Trust Kernel Authorization

on:
  pull_request:
    paths:
      - "research/trust_kernel/**"
      - ".github/workflows/research-trust-kernel.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorization-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ToxicJoin test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run proof-carrying authorization attacks
        run: python -m pytest -q research/trust_kernel/test_authorization.py
