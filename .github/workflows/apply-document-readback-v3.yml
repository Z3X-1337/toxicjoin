name: Apply Document Readback Patch V3

on:
  push:
    branches: [agent/live-datahub-proof]
    paths:
      - ".github/workflows/apply-document-readback-v3.yml"
  pull_request:
    paths:
      - ".github/workflows/apply-document-readback-v3.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-datahub-proof
          fetch-depth: 0

      - name: Apply document content verification and test updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent, indent

          # Production client: verify the persisted marker through the official
          # grep_documents content tool exposed by a fresh MCP process.
          source_path = Path("src/toxicjoin/integrations/datahub_mcp.py")
          source = source_path.read_text()
          start_marker = "    async def verify_document_marker("
          end_marker = "\n\n\ndef _unwrap_fastmcp_collection_result"
          start = source.index(start_marker)
          end = source.index(end_marker, start)
          method = indent(
              dedent('''
              async def verify_document_marker(self, urn: str, marker: str) -> dict[str, Any]:
                  definition = self._tools.get("grep_documents")
                  if definition is None:
                      raise DataHubMcpContractError(
                          "missing tool grep_documents for independent document verification"
                      )
                  required = {
                      "urns",
                      "pattern",
                      "context_chars",
                      "max_matches_per_doc",
                      "start_offset",
                  }
                  missing = sorted(required - set(definition.properties))
                  if missing:
                      raise DataHubMcpContractError(
                          "tool grep_documents missing input properties: "
                          + ", ".join(missing)
                      )

                  payload = await self.transport.call_tool(
                      "grep_documents",
                      {
                          "urns": [urn],
                          "pattern": marker,
                          "context_chars": 160,
                          "max_matches_per_doc": 3,
                          "start_offset": 0,
                      },
                  )
                  if not isinstance(payload, dict):
                      raise DataHubMcpError(
                          "grep_documents returned an unexpected payload"
                      )
                  results = payload.get("results")
                  total_matches = payload.get("total_matches")
                  if not isinstance(results, list) or not all(
                      isinstance(item, dict) for item in results
                  ):
                      raise DataHubMcpError(
                          "grep_documents payload has invalid results"
                      )
                  if not isinstance(total_matches, int):
                      raise DataHubMcpError(
                          "grep_documents payload has invalid total_matches"
                      )

                  for result in results:
                      if result.get("urn") != urn:
                          continue
                      matches = result.get("matches")
                      if not isinstance(matches, list):
                          continue
                      for match in matches:
                          if (
                              isinstance(match, dict)
                              and marker in str(match.get("excerpt", ""))
                          ):
                              return result

                  if total_matches <= 0:
                      raise DataHubMcpError(
                          "independent document read-back did not contain the verification marker"
                      )
                  raise DataHubMcpError(
                      "grep_documents reported matches without verifiable marker evidence"
                  )
              ''').lstrip(),
              "    ",
          ).rstrip()
          source_path.write_text(source[:start] + method + source[end:])

          # Unit tests: require the document-content contract and prove success,
          # absence, and missing-tool failure paths.
          unit_path = Path("tests/unit/test_datahub_mcp.py")
          unit = unit_path.read_text()
          unit_start = unit.index(
              "def test_independent_marker_readback_rejects_missing_marker() -> None:"
          )
          unit_end = unit.index(
              "\ndef test_get_entities_accepts_fastmcp_collection_result_envelope()",
              unit_start,
          )
          unit_replacement = dedent('''
          def _grep_documents_contract() -> McpToolDefinition:
              return McpToolDefinition(
                  name="grep_documents",
                  input_schema={
                      "type": "object",
                      "properties": {
                          "urns": {"type": "array"},
                          "pattern": {"type": "string"},
                          "context_chars": {"type": "integer"},
                          "max_matches_per_doc": {"type": "integer"},
                          "start_offset": {"type": "integer"},
                      },
                  },
              )


          def test_independent_marker_readback_requires_document_content_tool() -> None:
              urn = "urn:li:document:toxicjoin-decision-123"
              client = DataHubMcpClient(FakeTransport())
              asyncio.run(client.discover_and_validate(require_mutations=False))

              with pytest.raises(DataHubMcpContractError, match="grep_documents"):
                  asyncio.run(
                      client.verify_document_marker(
                          urn,
                          "TOXICJOIN_MARKER_ABC",
                      )
                  )


          def test_independent_marker_readback_rejects_missing_marker() -> None:
              urn = "urn:li:document:toxicjoin-decision-123"
              transport = FakeTransport(
                  tools=_official_contracts() + (_grep_documents_contract(),),
                  responses={
                      "grep_documents": [
                          {
                              "results": [],
                              "total_matches": 0,
                              "documents_with_matches": 0,
                          }
                      ]
                  },
              )
              client = DataHubMcpClient(transport)
              asyncio.run(client.discover_and_validate(require_mutations=False))

              with pytest.raises(DataHubMcpError, match="verification marker"):
                  asyncio.run(
                      client.verify_document_marker(
                          urn,
                          "TOXICJOIN_MARKER_ABC",
                      )
                  )


          def test_independent_marker_readback_accepts_grep_evidence() -> None:
              urn = "urn:li:document:toxicjoin-decision-123"
              marker = "TOXICJOIN_MARKER_ABC"
              transport = FakeTransport(
                  tools=_official_contracts() + (_grep_documents_contract(),),
                  responses={
                      "grep_documents": [
                          {
                              "results": [
                                  {
                                      "urn": urn,
                                      "title": "ToxicJoin decision",
                                      "matches": [
                                          {
                                              "excerpt": f"marker: {marker}",
                                              "position": 12,
                                          }
                                      ],
                                      "total_matches": 1,
                                  }
                              ],
                              "total_matches": 1,
                              "documents_with_matches": 1,
                          }
                      ]
                  },
              )
              client = DataHubMcpClient(transport)
              asyncio.run(client.discover_and_validate(require_mutations=False))

              evidence = asyncio.run(client.verify_document_marker(urn, marker))

              assert evidence["urn"] == urn

          ''')
          unit_path.write_text(
              unit[:unit_start] + unit_replacement + unit[unit_end + 1 :]
          )

          # Integration test: model two distinct sessions. Only the fresh read
          # session exposes grep_documents and verifies the saved content marker.
          integration_path = Path("tests/integration/test_datahub_spike.py")
          integration = integration_path.read_text()
          old_list_tools = dedent('''
              async def list_tools(self) -> tuple[McpToolDefinition, ...]:
                  return _contracts()
          ''').lstrip()
          new_list_tools = dedent('''
              async def list_tools(self) -> tuple[McpToolDefinition, ...]:
                  contracts = _contracts()
                  if self.role == "read":
                      return contracts + (_grep_documents_contract(),)
                  return contracts
          ''').lstrip()
          old_list_tools = indent(old_list_tools, "    ")
          new_list_tools = indent(new_list_tools, "    ")
          if integration.count(old_list_tools) != 1:
              raise SystemExit("expected integration list_tools block once")
          integration = integration.replace(old_list_tools, new_list_tools, 1)

          read_start = integration.index("    def _read_call(")
          read_end = integration.index("\n\n\ndef _contracts()", read_start)
          read_method = indent(
              dedent('''
              def _read_call(self, name: str, arguments: dict[str, Any]) -> Any:
                  if name != "grep_documents":
                      raise AssertionError(f"unexpected read-session tool {name}")
                  assert arguments["urns"] == [DOCUMENT_URN]
                  marker = str(arguments["pattern"])
                  saved = self.factory.saved_arguments or {}
                  content = str(saved.get("content", ""))
                  if not self.factory.preserve_marker:
                      content = "read-back content without the expected token"
                  if marker not in content:
                      return {
                          "results": [],
                          "total_matches": 0,
                          "documents_with_matches": 0,
                      }
                  return {
                      "results": [
                          {
                              "urn": DOCUMENT_URN,
                              "title": "ToxicJoin decision",
                              "matches": [
                                  {
                                      "excerpt": f"marker: {marker}",
                                      "position": content.index(marker),
                                  }
                              ],
                              "total_matches": 1,
                          }
                      ],
                      "total_matches": 1,
                      "documents_with_matches": 1,
                  }
              ''').lstrip(),
              "    ",
          ).rstrip()
          integration = (
              integration[:read_start]
              + read_method
              + integration[read_end:]
          )

          helper_marker = "\ndef _field(path: str, tag: str) -> dict[str, Any]:\n"
          grep_helper = dedent('''

          def _grep_documents_contract() -> McpToolDefinition:
              return McpToolDefinition(
                  name="grep_documents",
                  input_schema={
                      "properties": {
                          "urns": {},
                          "pattern": {},
                          "context_chars": {},
                          "max_matches_per_doc": {},
                          "start_offset": {},
                      }
                  },
              )
          ''')
          if integration.count(helper_marker) != 1:
              raise SystemExit("expected integration helper marker once")
          integration = integration.replace(
              helper_marker,
              grep_helper + helper_marker,
              1,
          )
          integration_path.write_text(integration)
          PY

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Verify patch
        shell: bash
        run: |
          set -o pipefail
          ruff check src tests
          pytest tests/unit/test_datahub_mcp.py tests/integration/test_datahub_spike.py -q

      - name: Commit verified document readback patch
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch changes remain."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/toxicjoin/integrations/datahub_mcp.py \
            tests/unit/test_datahub_mcp.py \
            tests/integration/test_datahub_spike.py
          git commit -m "Verify DataHub Decision content through grep_documents"
          git push origin HEAD:agent/live-datahub-proof
