name: Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: read

# Temporary workflow used only to capture the current Ruff failure.
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Capture Ruff version
        run: ruff --version | tee ruff-version.txt

      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set +e
          ruff check src tests 2>&1 | tee ruff.log
          echo "${PIPESTATUS[0]}" > ruff-exit-code.txt
          exit 0

      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostic
          path: |
            ruff-version.txt
            ruff.log
            ruff-exit-code.txt
          if-no-files-found: error
          retention-days: 3
