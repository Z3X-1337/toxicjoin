name: Apply DataHub Readback Retry

on:
  push:
    branches: [agent/live-datahub-proof]
    paths:
      - ".github/workflows/apply-datahub-readback-retry.yml"

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-datahub-proof

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Apply bounded fresh-session readback retry
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          spike_path = Path('src/toxicjoin/integrations/datahub_spike.py')
          spike = spike_path.read_text(encoding='utf-8')

          replacements = [
              (
                  '    DataHubMcpClient,\n    DataHubMcpError,',
                  '    DataHubMcpClient,\n    DataHubMcpContractError,\n    DataHubMcpError,',
              ),
              (
                  '    independent_readback_verified: bool\n    report_sha256:',
                  '    independent_readback_verified: bool\n'
                  '    independent_readback_attempts: int = Field(ge=1)\n'
                  '    report_sha256:',
              ),
              (
                  '    transport_factory: TransportFactory = StdioDataHubMcpTransport,\n'
                  ') -> DataHubSpikeReport:\n'
                  '    """Run the live verification and persist a sanitized evidence report."""\n\n'
                  '    marker =',
                  '    transport_factory: TransportFactory = StdioDataHubMcpTransport,\n'
                  '    readback_attempts: int = 12,\n'
                  '    readback_delay_seconds: float = 5.0,\n'
                  ') -> DataHubSpikeReport:\n'
                  '    """Run live verification and persist sanitized evidence.\n\n'
                  '    DataHub acknowledges document writes before search indexing is\n'
                  '    guaranteed. Independent verification retries through fresh MCP\n'
                  '    processes so middleware caches or in-memory responses cannot satisfy\n'
                  '    the proof.\n'
                  '    """\n\n'
                  '    if readback_attempts < 1:\n'
                  '        raise ValueError("readback_attempts must be positive")\n'
                  '    if readback_delay_seconds < 0:\n'
                  '        raise ValueError("readback_delay_seconds must be non-negative")\n\n'
                  '    marker =',
              ),
              (
                  '    # A fresh stdio process and MCP session is intentional. Read-back cannot rely on\n'
                  '    # the session that performed the write or an in-memory response object.\n'
                  '    async with transport_factory(settings) as read_transport:\n'
                  '        read_client = DataHubMcpClient(read_transport)\n'
                  '        await read_client.discover_and_validate(require_mutations=False)\n'
                  '        await read_client.verify_document_marker(document_urn, marker)\n',
                  '    readback_attempts_used = await _verify_with_fresh_mcp_sessions(\n'
                  '        settings=settings,\n'
                  '        transport_factory=transport_factory,\n'
                  '        document_urn=document_urn,\n'
                  '        marker=marker,\n'
                  '        attempts=readback_attempts,\n'
                  '        delay_seconds=readback_delay_seconds,\n'
                  '    )\n',
              ),
              (
                  '        "independent_readback_verified": True,\n'
                  '        "report_sha256": "0" * 64,',
                  '        "independent_readback_verified": True,\n'
                  '        "independent_readback_attempts": readback_attempts_used,\n'
                  '        "report_sha256": "0" * 64,',
              ),
          ]

          for old, new in replacements:
              if old not in spike:
                  raise SystemExit(f'missing expected spike block: {old[:80]!r}')
              spike = spike.replace(old, new, 1)

          helper = '''\n\nasync def _verify_with_fresh_mcp_sessions(\n    *,\n    settings: DataHubMcpSettings,\n    transport_factory: TransportFactory,\n    document_urn: str,\n    marker: str,\n    attempts: int,\n    delay_seconds: float,\n) -> int:\n    """Verify a saved document after eventual search indexing.\n\n    Missing ``grep_documents`` is transient when DataHub has accepted the write but\n    its document index is not visible yet. Every attempt starts a new MCP process.\n    A malformed tool schema is a permanent contract failure and is not retried.\n    """\n\n    last_error: DataHubMcpError | None = None\n    for attempt in range(1, attempts + 1):\n        try:\n            async with transport_factory(settings) as read_transport:\n                read_client = DataHubMcpClient(read_transport)\n                await read_client.discover_and_validate(require_mutations=False)\n                await read_client.verify_document_marker(document_urn, marker)\n            return attempt\n        except DataHubMcpContractError as exc:\n            if "missing tool grep_documents" not in str(exc):\n                raise\n            last_error = exc\n        except DataHubMcpError as exc:\n            last_error = exc\n\n        if attempt < attempts:\n            await asyncio.sleep(delay_seconds)\n\n    raise DataHubMcpError(\n        "independent document verification did not become available after "\n        f"{attempts} fresh MCP sessions"\n    ) from last_error\n'''
          marker = '\n\ndef _decision_content(\n'
          if marker not in spike:
              raise SystemExit('missing helper insertion marker')
          spike = spike.replace(marker, helper + marker, 1)
          spike_path.write_text(spike, encoding='utf-8')

          test_path = Path('tests/integration/test_datahub_spike.py')
          test = test_path.read_text(encoding='utf-8')
          test_replacements = [
              (
                  'class SessionFactory:\n'
                  '    def __init__(self, *, preserve_marker: bool = True) -> None:\n'
                  '        self.preserve_marker = preserve_marker\n'
                  '        self.created = 0\n'
                  '        self.saved_arguments: dict[str, Any] | None = None\n\n'
                  '    def __call__(self, settings: DataHubMcpSettings) -> "FakeTransport":\n'
                  '        self.created += 1\n'
                  '        role = "write" if self.created == 1 else "read"\n'
                  '        return FakeTransport(self, role=role)\n',
                  'class SessionFactory:\n'
                  '    def __init__(\n'
                  '        self,\n'
                  '        *,\n'
                  '        preserve_marker: bool = True,\n'
                  '        grep_ready_after: int = 1,\n'
                  '    ) -> None:\n'
                  '        self.preserve_marker = preserve_marker\n'
                  '        self.grep_ready_after = grep_ready_after\n'
                  '        self.created = 0\n'
                  '        self.saved_arguments: dict[str, Any] | None = None\n\n'
                  '    def __call__(self, settings: DataHubMcpSettings) -> "FakeTransport":\n'
                  '        self.created += 1\n'
                  '        role = "write" if self.created == 1 else "read"\n'
                  '        return FakeTransport(\n'
                  '            self,\n'
                  '            role=role,\n'
                  '            read_attempt=max(0, self.created - 1),\n'
                  '        )\n',
              ),
              (
                  'class FakeTransport:\n'
                  '    def __init__(self, factory: SessionFactory, *, role: str) -> None:\n'
                  '        self.factory = factory\n'
                  '        self.role = role\n',
                  'class FakeTransport:\n'
                  '    def __init__(\n'
                  '        self,\n'
                  '        factory: SessionFactory,\n'
                  '        *,\n'
                  '        role: str,\n'
                  '        read_attempt: int,\n'
                  '    ) -> None:\n'
                  '        self.factory = factory\n'
                  '        self.role = role\n'
                  '        self.read_attempt = read_attempt\n',
              ),
              (
                  '    async def list_tools(self) -> tuple[McpToolDefinition, ...]:\n'
                  '        contracts = _contracts()\n'
                  '        if self.role == "read":\n'
                  '            return contracts + (_grep_documents_contract(),)\n'
                  '        return contracts\n',
                  '    async def list_tools(self) -> tuple[McpToolDefinition, ...]:\n'
                  '        contracts = _contracts()\n'
                  '        if (\n'
                  '            self.role == "read"\n'
                  '            and self.read_attempt >= self.factory.grep_ready_after\n'
                  '        ):\n'
                  '            return contracts + (_grep_documents_contract(),)\n'
                  '        return contracts\n',
              ),
              (
                  '    assert factory.created == 2\n'
                  '    assert report.status == "verified"',
                  '    assert factory.created == 2\n'
                  '    assert report.independent_readback_attempts == 1\n'
                  '    assert report.status == "verified"',
              ),
              (
                  '                transport_factory=factory,\n'
                  '            )\n'
                  '        )\n\n'
                  '    assert factory.created == 2\n'
                  '    assert not output.exists()\n',
                  '                transport_factory=factory,\n'
                  '                readback_attempts=2,\n'
                  '                readback_delay_seconds=0,\n'
                  '            )\n'
                  '        )\n\n'
                  '    assert factory.created == 3\n'
                  '    assert not output.exists()\n',
              ),
          ]
          for old, new in test_replacements:
              if old not in test:
                  raise SystemExit(f'missing expected test block: {old[:80]!r}')
              test = test.replace(old, new, 1)

          delayed_test = '''\n\ndef test_spike_retries_fresh_sessions_until_document_is_indexed(tmp_path) -> None:\n    factory = SessionFactory(grep_ready_after=3)\n    output = tmp_path / "datahub-spike.json"\n\n    report = asyncio.run(\n        run_datahub_spike(\n            settings=_settings(),\n            asset_map=_asset_map(),\n            output=output,\n            transport_factory=factory,\n            readback_attempts=4,\n            readback_delay_seconds=0,\n        )\n    )\n\n    assert factory.created == 4\n    assert report.independent_readback_attempts == 3\n    assert report.independent_readback_verified is True\n    assert output.exists()\n'''
          test += delayed_test
          test_path.write_text(test, encoding='utf-8')
          PY

      - name: Validate patch
        run: |
          ruff check src tests
          pytest tests/unit/test_datahub_mcp.py tests/integration/test_datahub_spike.py -q

      - name: Commit validated code only
        shell: bash
        run: |
          git config user.name 'toxicjoin-ci'
          git config user.email 'actions@users.noreply.github.com'
          git add src/toxicjoin/integrations/datahub_spike.py tests/integration/test_datahub_spike.py
          if git diff --cached --quiet; then
            echo 'No code changes to commit.'
            exit 0
          fi
          git commit -m 'Retry DataHub document readback after indexing delay'
          git push origin HEAD:agent/live-datahub-proof
