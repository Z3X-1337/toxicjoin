name: Patch Mobile Replay Disclosure Verification

on:
  push:
    branches: [agent/hosted-replay-verification]
    paths:
      - ".github/workflows/patch-replay-text-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out verification branch
        uses: actions/checkout@v4
        with:
          ref: agent/hosted-replay-verification

      - name: Use the visible disclosure instead of the responsive header chip
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/verify_hosted_replay.mjs')
          content = path.read_text(encoding='utf-8')
          old = '''      await page.getByText("Deterministic replay", { exact: true }).waitFor({
        state: "visible",
        timeout: 30_000,
      });
'''
          if content.count(old) != 1:
              raise SystemExit('expected responsive header assertion not found exactly once')
          path.write_text(content.replace(old, '', 1), encoding='utf-8')
          PY
          node --check scripts/verify_hosted_replay.mjs

      - name: Commit the verifier only
        shell: bash
        run: |
          git config user.name 'toxicjoin-ci'
          git config user.email 'actions@users.noreply.github.com'
          git add scripts/verify_hosted_replay.mjs
          git commit -m 'Verify the visible replay disclosure on mobile'
          git push origin HEAD:agent/hosted-replay-verification
