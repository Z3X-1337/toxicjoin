name: Patch Replay Text Assertion

on:
  push:
    branches: [agent/hosted-replay-verification]
    paths:
      - ".github/workflows/patch-replay-text-check.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out verification branch
        uses: actions/checkout@v4
        with:
          ref: agent/hosted-replay-verification

      - name: Make rendered-text assertions case-insensitive
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/verify_hosted_replay.mjs')
          content = path.read_text(encoding='utf-8')
          old = '''      for (const required of [
        "ToxicJoin",
        "Initial policy",
        "REWRITE",
        "After remediation",
        "ALLOW",
        "30",
        "False allows",
        "0",
      ]) {
        if (!bodyText.includes(required)) {
          throw new Error(`${profile.name}: missing required text ${required}`);
        }
      }
'''
          new = '''      const renderedText = bodyText.toUpperCase();
      for (const required of [
        "TOXICJOIN",
        "INITIAL POLICY",
        "REWRITE",
        "AFTER REMEDIATION",
        "ALLOW",
        "30",
        "FALSE ALLOWS",
        "0",
      ]) {
        if (!renderedText.includes(required)) {
          throw new Error(`${profile.name}: missing required rendered text ${required}`);
        }
      }
'''
          if content.count(old) != 1:
              raise SystemExit('expected assertion block not found exactly once')
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY
          node --check scripts/verify_hosted_replay.mjs

      - name: Commit the verifier only
        shell: bash
        run: |
          git config user.name 'toxicjoin-ci'
          git config user.email 'actions@users.noreply.github.com'
          git add scripts/verify_hosted_replay.mjs
          git commit -m 'Match replay assertions against rendered text'
          git push origin HEAD:agent/hosted-replay-verification
