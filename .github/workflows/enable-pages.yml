name: Enable GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/enable-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  enable-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Enable workflow-based GitHub Pages publishing
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${REPOSITORY}/pages"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          status=$(curl --silent --output pages-current.json --write-out '%{http_code}' \
            "${headers[@]}" "$api")

          if [[ "$status" == "404" ]]; then
            create_status=$(curl --silent --output pages-result.json --write-out '%{http_code}' \
              --request POST "${headers[@]}" \
              --data '{"build_type":"workflow"}' "$api")
            test "$create_status" = "201"
          elif [[ "$status" == "200" ]]; then
            update_status=$(curl --silent --output pages-result.json --write-out '%{http_code}' \
              --request PUT "${headers[@]}" \
              --data '{"build_type":"workflow"}' "$api")
            test "$update_status" = "204"
          else
            cat pages-current.json >&2 || true
            echo "Unexpected Pages status: $status" >&2
            exit 1
          fi

          final_status=$(curl --silent --output pages-final.json --write-out '%{http_code}' \
            "${headers[@]}" "$api")
          test "$final_status" = "200"
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('pages-final.json').read_text())
          assert payload['build_type'] == 'workflow'
          assert payload['html_url'].startswith('https://')
          print(json.dumps({
              'html_url': payload['html_url'],
              'build_type': payload['build_type'],
              'status': payload.get('status'),
          }, indent=2))
          PY

      - name: Configure GitHub Pages metadata
        id: pages
        uses: actions/configure-pages@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Install pinned frontend dependencies
        working-directory: apps/web
        run: npm install --no-audit --no-fund

      - name: Typecheck and test hosted replay
        working-directory: apps/web
        run: npm run typecheck && npm run test

      - name: Build hosted replay for repository subpath
        working-directory: apps/web
        env:
          TOXICJOIN_WEB_BASE: /toxicjoin/
        run: npm run build

      - name: Verify static artifact
        shell: bash
        run: |
          set -euo pipefail
          grep -q '/toxicjoin/assets/' apps/web/dist/index.html
          test -n "$(find apps/web/dist/assets -type f -name '*.js' -print -quit)"
          test -n "$(find apps/web/dist/assets -type f -name '*.css' -print -quit)"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

      - name: Deploy hosted replay
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed URL is reachable
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Deployed URL: $PAGE_URL"
          for attempt in $(seq 1 60); do
            status=$(curl --location --silent --output deployed-index.html --write-out '%{http_code}' "$PAGE_URL" || true)
            if [[ "$status" == "200" ]]; then
              break
            fi
            sleep 5
          done
          test "$(curl --location --silent --output deployed-index.html --write-out '%{http_code}' "$PAGE_URL")" = "200"
          grep -q '<div id="root"></div>' deployed-index.html
