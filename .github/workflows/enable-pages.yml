name: Enable GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/enable-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  enable:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable workflow-based GitHub Pages publishing
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${REPOSITORY}/pages"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          status=$(curl --silent --output pages-current.json --write-out '%{http_code}' \
            "${headers[@]}" "$api")

          if [[ "$status" == "404" ]]; then
            create_status=$(curl --silent --output pages-result.json --write-out '%{http_code}' \
              --request POST "${headers[@]}" \
              --data '{"build_type":"workflow"}' "$api")
            test "$create_status" = "201"
          elif [[ "$status" == "200" ]]; then
            update_status=$(curl --silent --output pages-result.json --write-out '%{http_code}' \
              --request PUT "${headers[@]}" \
              --data '{"build_type":"workflow"}' "$api")
            test "$update_status" = "204"
          else
            cat pages-current.json >&2 || true
            echo "Unexpected Pages status: $status" >&2
            exit 1
          fi

          final_status=$(curl --silent --output pages-final.json --write-out '%{http_code}' \
            "${headers[@]}" "$api")
          test "$final_status" = "200"
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('pages-final.json').read_text())
          assert payload['build_type'] == 'workflow'
          assert payload['html_url'].startswith('https://')
          print(json.dumps({
              'html_url': payload['html_url'],
              'build_type': payload['build_type'],
              'status': payload.get('status'),
          }, indent=2))
          PY
