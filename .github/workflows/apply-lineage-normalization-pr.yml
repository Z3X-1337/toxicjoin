name: Apply Lineage Normalization PR

on:
  pull_request:
    paths:
      - ".github/workflows/apply-lineage-normalization-pr.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-datahub-proof
          fetch-depth: 0

      - name: Extract and apply the validated lineage patch
        shell: bash
        run: |
          awk '
            /python - <<.PY./ { capture=1; next }
            capture && /^          PY$/ { exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-lineage-normalization.yml > /tmp/apply-lineage.py
          test -s /tmp/apply-lineage.py
          python /tmp/apply-lineage.py

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Reverify lineage changes
        shell: bash
        run: |
          ruff check src tests
          pytest \
            tests/unit/test_datahub_mcp.py \
            tests/unit/test_datahub_context.py \
            tests/integration/test_datahub_spike.py \
            -q

      - name: Commit and push verified files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/toxicjoin/integrations/datahub_mcp.py \
            src/toxicjoin/context/datahub.py \
            src/toxicjoin/integrations/datahub_spike.py \
            tests/unit/test_datahub_mcp.py \
            tests/unit/test_datahub_context.py \
            .github/workflows/datahub-live.yml
          git commit -m "Normalize official DataHub MCP lineage results"
          git push origin HEAD:agent/live-datahub-proof
