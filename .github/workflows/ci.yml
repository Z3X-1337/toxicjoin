name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Lint
        run: ruff check src tests

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee pytest-${{ matrix.python-version }}.log

      - name: Generate benchmark evidence
        if: matrix.python-version == '3.11'
        run: toxicjoin-benchmark --output-dir artifacts/benchmark

      - name: Upload benchmark evidence
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: toxicjoin-benchmark
          path: artifacts/benchmark/
          if-no-files-found: error
          retention-days: 30

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.log
          if-no-files-found: error
          retention-days: 14

  web:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Install exact frontend dependencies
        working-directory: apps/web
        run: npm install --no-audit --no-fund

      - name: Typecheck, test, and build judge interface
        working-directory: apps/web
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee web-check.log

      - name: Upload judge interface build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: toxicjoin-judge-interface
          path: apps/web/dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toxicjoin-web-check
          path: apps/web/web-check.log
          if-no-files-found: error
          retention-days: 14
