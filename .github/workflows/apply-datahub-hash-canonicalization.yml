name: Apply DataHub Hash Canonicalization

on:
  push:
    branches: [agent/live-datahub-proof]
    paths:
      - ".github/workflows/apply-datahub-hash-canonicalization.yml"

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-datahub-proof

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Canonicalize UTC timestamps as persisted JSON
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = (
              Path('src/toxicjoin/integrations/datahub_seed.py'),
              Path('src/toxicjoin/integrations/datahub_spike.py'),
          )
          old = 'return value.astimezone(timezone.utc).isoformat()'
          new = 'return value.astimezone(timezone.utc).isoformat().replace("+00:00", "Z")'
          for path in paths:
              content = path.read_text(encoding='utf-8')
              if content.count(old) != 1:
                  raise SystemExit(f'expected one canonical datetime line in {path}')
              path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Validate canonical evidence hashing
        run: |
          ruff check src tests
          pytest tests/unit/test_datahub_report_hashes.py tests/unit/test_datahub_seed.py tests/integration/test_datahub_spike.py -q

      - name: Commit validated source changes only
        shell: bash
        run: |
          git config user.name 'toxicjoin-ci'
          git config user.email 'actions@users.noreply.github.com'
          git add src/toxicjoin/integrations/datahub_seed.py src/toxicjoin/integrations/datahub_spike.py
          if git diff --cached --quiet; then
            echo 'No source changes to commit.'
            exit 0
          fi
          git commit -m 'Make persisted DataHub evidence hashes reproducible'
          git push origin HEAD:agent/live-datahub-proof
