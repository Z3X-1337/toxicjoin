name: Temporary Security Audit

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Install Python project and audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip install pip-audit bandit

      - name: Capture Python environment
        run: |
          mkdir -p artifacts/security-audit
          python -m pip freeze | sort > artifacts/security-audit/pip-freeze.txt
          python - <<'PY' > artifacts/security-audit/framework-versions.txt
          import fastapi, starlette, uvicorn, pydantic, sqlglot, duckdb
          for module in (fastapi, starlette, uvicorn, pydantic, sqlglot, duckdb):
              print(f"{module.__name__}={getattr(module, '__version__', 'unknown')}")
          PY

      - name: Python dependency audit
        shell: bash
        run: |
          set +e
          pip-audit --format json --output artifacts/security-audit/pip-audit.json
          code=$?
          echo "$code" > artifacts/security-audit/pip-audit-exit-code.txt
          exit 0

      - name: Python static security scan
        shell: bash
        run: |
          set +e
          bandit -r src/toxicjoin -f json -o artifacts/security-audit/bandit.json
          code=$?
          echo "$code" > artifacts/security-audit/bandit-exit-code.txt
          exit 0

      - name: Install and audit frontend dependencies
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          npm install --no-audit --no-fund
          npm audit --json > ../../artifacts/security-audit/npm-audit.json
          code=$?
          echo "$code" > ../../artifacts/security-audit/npm-audit-exit-code.txt
          npm ls --all --json > ../../artifacts/security-audit/npm-tree.json 2>&1
          exit 0

      - name: Upload security audit reports
        uses: actions/upload-artifact@v4
        with:
          name: toxicjoin-temporary-security-audit
          path: artifacts/security-audit/
          if-no-files-found: error
          retention-days: 7
