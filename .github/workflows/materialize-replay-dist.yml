name: Materialize Verified Replay Artifact

on:
  push:
    branches: [agent/hosted-replay-verification]
    paths:
      - ".github/workflows/materialize-replay-dist.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out replay verification branch
        uses: actions/checkout@v4
        with:
          ref: agent/hosted-replay-verification

      - name: Download the exact green judge-interface artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public/replay
          mkdir -p public/replay
          gh run download 29968713188 \
            --repo "$GITHUB_REPOSITORY" \
            --name toxicjoin-judge-interface \
            --dir public/replay
          test -f public/replay/index.html
          test -n "$(find public/replay/assets -type f -name '*.js' -print -quit)"
          test -n "$(find public/replay/assets -type f -name '*.css' -print -quit)"

      - name: Record immutable artifact provenance
        shell: bash
        run: |
          set -euo pipefail
          cat > public/replay/provenance.json <<'JSON'
          {
            "schema_version": "1.0",
            "source_workflow_run": 29968713188,
            "source_pr": 7,
            "source_commit": "bd8085c300a0065cc714d6e86f62f657df2d84c9",
            "source_artifact_id": 8548808025,
            "source_artifact_digest": "sha256:93c8773c931ece44f0963a0b19e839430e2e49f31fcfcb380a4a6f4c9cf382a7",
            "artifact_name": "toxicjoin-judge-interface"
          }
          JSON
          sha256sum public/replay/index.html public/replay/assets/* > public/replay/SHA256SUMS

      - name: Commit artifact files only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'toxicjoin-ci'
          git config user.email 'actions@users.noreply.github.com'
          git add public/replay
          if git diff --cached --quiet; then
            echo 'Replay artifact already materialized.'
            exit 0
          fi
          git commit -m 'Materialize the verified judge replay artifact'
          git push origin HEAD:agent/hosted-replay-verification
