name: Apply Capture Authorization Verifier

on:
  push:
    branches: [agent/video-captures]
    paths:
      - ".github/workflows/apply-capture-auth-verifier.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out capture branch
        uses: actions/checkout@v4
        with:
          ref: agent/video-captures

      - name: Replace UI mutation with read-only privilege verification
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/capture_datahub_video_evidence.mjs')
          text = path.read_text(encoding='utf-8')
          start = text.index('async function prepareCaptureAuthorization() {')
          end = text.index('async function clickEntityTab(', start)
          replacement = r'''async function prepareCaptureAuthorization() {
  const me = await executeGraphQL(`
    query CaptureGetMe {
      me {
        corpUser { urn username }
        platformPrivileges { managePolicies }
      }
    }
  `);
  const actorUrn = me?.me?.corpUser?.urn;
  const username = me?.me?.corpUser?.username;
  const managePolicies = Boolean(me?.me?.platformPrivileges?.managePolicies);
  if (actorUrn !== "urn:li:corpuser:datahub") {
    throw new Error(`unexpected DataHub capture actor: ${actorUrn ?? "missing"}`);
  }

  // The capture-only policy is emitted directly to local GMS before Chrome is
  // started. The browser session never mutates policies; it only proves that
  // DataHub's policy engine has made VIEW_ENTITY_PAGE effective for this actor.
  const policyUrn = "urn:li:dataHubPolicy:toxicjoin-capture-view";
  let privileges = [];
  for (let attempt = 1; attempt <= 60; attempt += 1) {
    const result = await executeGraphQL(
      `query CaptureGrantedPrivileges($input: GetGrantedPrivilegesInput!) {
        getGrantedPrivileges(input: $input) { privileges }
      }`,
      {
        input: {
          actorUrn,
          resourceSpec: {
            resourceType: "DATASET",
            resourceUrn: datasetUrn,
          },
        },
      },
    );
    privileges = result?.getGrantedPrivileges?.privileges ?? [];
    if (privileges.includes("VIEW_ENTITY_PAGE")) break;
    await sleep(1_000);
  }

  authorizationEvidence = {
    username,
    actor_urn: actorUrn,
    manage_policies: managePolicies,
    policy_urn: policyUrn,
    policy_source: "direct-gms-capture-only",
    view_entity_page_granted: privileges.includes("VIEW_ENTITY_PAGE"),
    granted_privileges: [...privileges].sort(),
  };
  fs.writeFileSync(
    path.join(outputDirectory, "capture-authorization.json"),
    `${JSON.stringify(authorizationEvidence, null, 2)}\n`,
    "utf8",
  );

  if (!authorizationEvidence.view_entity_page_granted) {
    throw new Error(
      `VIEW_ENTITY_PAGE was not granted after policy-cache wait: ${JSON.stringify(authorizationEvidence)}`,
    );
  }
}

'''
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY

      - name: Validate JavaScript syntax and policy invariants
        shell: bash
        run: |
          node --check scripts/capture_datahub_video_evidence.mjs
          grep -q 'policy_source: "direct-gms-capture-only"' scripts/capture_datahub_video_evidence.mjs
          ! grep -q 'CaptureEnableViewEntity' scripts/capture_datahub_video_evidence.mjs
          grep -q 'getGrantedPrivileges' scripts/capture_datahub_video_evidence.mjs

      - name: Commit capture script only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'toxicjoin-ci'
          git config user.email 'actions@users.noreply.github.com'
          git add scripts/capture_datahub_video_evidence.mjs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Verify capture authorization from GMS policy'
          git push origin HEAD:agent/video-captures
