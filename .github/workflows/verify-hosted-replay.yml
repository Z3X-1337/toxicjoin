name: Verify Hosted Replay

on:
  pull_request:
    paths:
      - ".github/workflows/verify-hosted-replay.yml"
      - ".github/workflows/pages.yml"
      - "apps/web/**"
      - "scripts/verify_hosted_replay.mjs"
  workflow_dispatch:

permissions:
  contents: read
  pages: read

concurrency:
  group: hosted-replay-verification-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-public-replay:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Install pinned browser automation client
        run: npm install --no-save --no-audit --no-fund playwright-core@1.54.1

      - name: Discover preinstalled Chrome or Edge
        id: browser
        shell: bash
        run: |
          set -euo pipefail
          browser_path=""
          for command_name in \
            google-chrome \
            google-chrome-stable \
            chromium \
            chromium-browser \
            microsoft-edge \
            microsoft-edge-stable; do
            candidate=$(command -v "$command_name" || true)
            if [[ -n "$candidate" && -x "$candidate" ]]; then
              browser_path="$candidate"
              break
            fi
          done

          if [[ -z "$browser_path" ]]; then
            browser_path=$(find /usr/bin /opt -maxdepth 4 -type f \
              \( -name 'google-chrome*' -o -name 'chromium*' -o -name 'microsoft-edge*' \) \
              -perm -111 2>/dev/null | head -n 1 || true)
          fi

          if [[ -z "$browser_path" ]]; then
            echo "No supported preinstalled browser was found." >&2
            exit 1
          fi

          echo "path=$browser_path" >> "$GITHUB_OUTPUT"
          "$browser_path" --version

      - name: Inspect official GitHub Pages configuration
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${REPOSITORY}/pages"
          for attempt in $(seq 1 60); do
            status=$(curl --silent --output pages-status.json --write-out '%{http_code}' \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api" || true)
            if [[ "$status" == "200" ]]; then
              break
            fi
            echo "Pages API attempt $attempt returned HTTP ${status:-unavailable}."
            sleep 5
          done

          test "$(curl --silent --output pages-status.json --write-out '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api")" = "200"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('pages-status.json').read_text())
          assert payload['build_type'] == 'workflow'
          url = payload['html_url']
          assert url.startswith('https://')
          if not url.endswith('/'):
              url += '/'
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as handle:
              handle.write(f'REPLAY_URL={url}\n')
          print(json.dumps({
              'html_url': url,
              'build_type': payload['build_type'],
              'status': payload.get('status'),
              'custom_404': payload.get('custom_404'),
          }, indent=2))
          PY

      - name: Wait for public GitHub Pages response
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            status=$(curl --location --silent --output hosted-replay.html --write-out '%{http_code}' "$REPLAY_URL" || true)
            if [[ "$status" == "200" ]]; then
              echo "Hosted replay returned HTTP 200 after $attempt attempt(s)."
              break
            fi
            echo "Attempt $attempt returned HTTP ${status:-unavailable}; retrying."
            sleep 5
          done
          test "$(curl --location --silent --output hosted-replay.html --write-out '%{http_code}' "$REPLAY_URL")" = "200"
          grep -q '<div id="root"></div>' hosted-replay.html
          grep -q '/toxicjoin/assets/' hosted-replay.html

      - name: Verify desktop and mobile replay in Chromium
        env:
          BROWSER_EXECUTABLE: ${{ steps.browser.outputs.path }}
        run: node scripts/verify_hosted_replay.mjs

      - name: Upload hosted replay verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toxicjoin-hosted-replay-verification
          path: |
            pages-status.json
            hosted-replay.html
            artifacts/hosted-replay/verification.json
            artifacts/hosted-replay/desktop.png
            artifacts/hosted-replay/mobile.png
          if-no-files-found: warn
          retention-days: 30
