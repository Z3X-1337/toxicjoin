name: Apply Agent Skill Documentation

# Temporary workflow; remove after the reviewed changes are committed.
on:
  push:
    branches: [agent/datahub-agent-skill]
    paths:
      - ".github/workflows/apply-agent-skill-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out Agent Skill branch
        uses: actions/checkout@v4
        with:
          ref: agent/datahub-agent-skill

      - name: Apply exact documentation and install-message updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected block exactly once, found {text.count(old)}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          readme_anchor = '''Evidence from GitHub Actions run `29975433969` is committed in [docs/evidence/datahub-live.md](docs/evidence/datahub-live.md), [datahub-live-seed.json](docs/evidence/datahub-live-seed.json), and [datahub-live-spike.json](docs/evidence/datahub-live-spike.json). Both report hashes are reproducible from their persisted JSON, and the retained evidence contains no token value, password, local endpoint, raw warehouse row, or application secret.\n'''
          readme_new = readme_anchor + '''\n### Reusable DataHub Agent Skill — preview evidence\n\nToxicJoin also publishes a git-backed [Compositional Risk Review Agent Skill](skills/compositional-risk-review/SKILL.md). In a separate preview-only proof, DataHub's Agent Registry modeled the project as:\n\n```text\nToxicJoin Privacy Firewall Agent\n  -> Compositional Risk Review Agent Skill\n  -> five DataHub MCP tool API entities\n  -> five governed ToxicJoin datasets\n```\n\nA fresh DataHub graph client independently read back the skill source repository/path, all five required tools, the Agent→Skill and Agent→Tool dependencies, and all five consumed-dataset lineage relationships. Evidence is committed in [docs/evidence/datahub-agent-registry.md](docs/evidence/datahub-agent-registry.md).\n\nThis is deliberately isolated from the core enforcement path. The proof uses `acryl-datahub==1.6.0.16rc3` and DataHub's documented `quickstart` development channel because Agent Registry helpers were not present in the stable `1.6.0.15` wheel. ToxicJoin's stable SDK/MCP evidence and deterministic enforcement remain independent of this preview capability.\n'''
          replace_once('README.md', readme_anchor, readme_new)

          judge_old = '''A valid live run must prove:\n\n1. configured DataHub assets were read;\n2. governed schema fields and sensitivity labels were read;\n3. upstream column lineage was read;\n4. a DataHub `Decision` document was written;\n5. the first MCP process was closed;\n6. a fresh MCP process read the document back and found the unique marker.\n\nUntil that live report exists, the repository intentionally leaves checklist item 9 unchecked.\n'''
          judge_new = '''A valid live run must prove:\n\n1. configured DataHub assets were read;\n2. governed schema fields and sensitivity labels were read;\n3. upstream column lineage was read;\n4. a DataHub `Decision` document was written;\n5. the first MCP process was closed;\n6. a fresh MCP process read the document back and found the unique marker.\n\nThat stable live proof is committed in [`docs/evidence/datahub-live.md`](evidence/datahub-live.md).\n\n### Optional preview: DataHub Agent Registry graph\n\nFor reviewers interested in the reusable DataHub-native capability, inspect:\n\n- [`skills/compositional-risk-review/SKILL.md`](../skills/compositional-risk-review/SKILL.md);\n- [`docs/evidence/datahub-agent-registry.md`](evidence/datahub-agent-registry.md).\n\nThe separate preview proof registers five MCP tools as API entities, one git-backed Agent Skill, and one AI Agent consuming the five governed datasets. A fresh graph client verifies the persisted Agent→Skill→Tools and Agent→Datasets relationships. This proof uses the DataHub `quickstart` development channel and `acryl-datahub==1.6.0.16rc3`; it is not required for ToxicJoin's core enforcement or stable SDK/MCP integration.\n'''
          replace_once('docs/judge-testing.md', judge_old, judge_new)

          checklist_anchor = '''  Verified: `docs/evidence/datahub-live.md`, `docs/evidence/datahub-live-seed.json`, `docs/evidence/datahub-live-spike.json`, and GitHub Actions run https://github.com/Z3X-1337/toxicjoin/actions/runs/29975433969.\n\n- [x] **10. Expose API and curated scenarios**\n'''
          checklist_new = '''  Verified: `docs/evidence/datahub-live.md`, `docs/evidence/datahub-live-seed.json`, `docs/evidence/datahub-live-spike.json`, and GitHub Actions run https://github.com/Z3X-1337/toxicjoin/actions/runs/29975433969.\n\n  **Preview Agent Registry extension:** A reusable git-backed `Compositional Risk Review` Agent Skill, five MCP tool API entities, and a ToxicJoin AI Agent were independently read back from DataHub's coordinated development quickstart. This preview is isolated from the stable enforcement path and is documented in `docs/evidence/datahub-agent-registry.md`.\n\n- [x] **10. Expose API and curated scenarios**\n'''
          replace_once('docs/hackathon-build/checklist.md', checklist_anchor, checklist_new)

          for path in (
              'src/toxicjoin/integrations/datahub_agent_registry.py',
              'src/toxicjoin/integrations/datahub_agent_registry_verify.py',
          ):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              old = "install the live integration with: pip install -e '.[datahub]'"
              new = "install the Agent Registry preview with: pip install -e '.[agent-registry]'"
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected install hint once, found {text.count(old)}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Validate updated evidence references
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'docs/evidence/datahub-agent-registry.md' README.md
          grep -q 'Optional preview: DataHub Agent Registry graph' docs/judge-testing.md
          grep -q 'Preview Agent Registry extension' docs/hackathon-build/checklist.md
          grep -q "pip install -e '.\[agent-registry\]'" src/toxicjoin/integrations/datahub_agent_registry.py
          grep -q "pip install -e '.\[agent-registry\]'" src/toxicjoin/integrations/datahub_agent_registry_verify.py
          test -f docs/evidence/datahub-agent-registry.json
          test -f docs/evidence/datahub-agent-registry-verified.json

      - name: Commit reviewed updates only
        shell: bash
        run: |
          git config user.name 'toxicjoin-ci'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            README.md \
            docs/judge-testing.md \
            docs/hackathon-build/checklist.md \
            src/toxicjoin/integrations/datahub_agent_registry.py \
            src/toxicjoin/integrations/datahub_agent_registry_verify.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Document verified DataHub Agent Skill preview'
          git push origin HEAD:agent/datahub-agent-skill
